<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StringTune : Tutorial : Parallax</title>
  <link rel="icon" type="image/png" href="assets/favicon.png?v=3">
  <script src="https://unpkg.com/@fiddle-digital/string-tune@1.1.55/dist/index.js"></script>
  <style>
@property --progress {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-angle {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

@property --spotlight-distance {
  syntax: '<number>';
  inherits: true;
  initial-value: 0;
}

:root {
  --vh: 1vh;
  --vw: 1vw;
  --c-white: #ffffff;
  --c-black: #000000;
  --c-black-rgb: 0, 0, 0;
  --c-grey-dark: #333333;
  --c-grey-dark-rgba: 51, 51, 51;
  --c-grey: #999999;
  --c-red: #FF5A37;

  --easing-function: cubic-bezier(0.86, 0, 0.31, 1);
  --easing-function-2: cubic-bezier(0.35, 0.35, 0, 1);
  --easing-timing: 1.5s;

  --g-gap: 0.4rem;
  --g-margin: calc(var(--g-gap) * 2);

  --mm: 0.64rem;
  --m: 0.8rem;
  --p: 1rem;
  --h6: 1.25rem;
  --h5: 1.563rem;
  --h4: 1.953rem;
  --h3: 2.441rem;
  --h2: 3.052rem;
  --h1: 3.815rem;
  --h0: 5.065rem;
  --large: max(6.331rem, 18vw);
  
}
@media (min-width: 1024px) {
  :root {
    --g-margin: calc(var(--g-gap) * 4);
  }
}

html,
body,
* {
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  line-height: 1.25;
  font-family: Arial, Helvetica, sans-serif;
  background-color: #808080;
  color: black;
}
.-w {
  margin-left: var(--g-margin);
  margin-right: var(--g-margin);
}
@media (min-width: 1024px) {
  html {
    font-size: 20px;
  }
}
body {
  position: relative;
  min-height: 100lvh;
}
.note {
  color: var(--c-white);
}
svg {
  display: block;
}
img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
button {
  border: none;
  margin: 0;
  padding: 0;
  position: relative;
  background-color: transparent;
  cursor: pointer;
  display: block;
  touch-action: manipulation;
  color: var(--c-white);
}

h1,
h2,
h3,
h3,
h4,
h5,
h6 {
  font-family: Arial, Helvetica, sans-serif;
  font-weight: normal;
}
.-lrg {
  font-size: var(--large);
}
.-h0 {
  font-size: var(--h0);
}
h1, .-h1 {
  font-size: var(--h1);
}
h2, .-h2 {
  font-size: var(--h2);
}
h3, .-h3 {
  font-size: var(--h3);
}
h4, .-h4 {
  font-size: var(--h4);
}
h5, .-h5 {
  font-size: var(--h5);
}
h6, .-h6 {
  font-size: var(--h6);
}
.-p {
  font-size: var(--p);
}
.-m {
  font-size: var(--m);
}
.-mm {
  font-size: var(--mm);
}
@media (max-width: 1600px) {
  .-mid-lrg {
    font-size: var(--large);
  }
  .-mid-h0 {
    font-size: var(--h0);
  }
  .-mid-h1 {
    font-size: var(--h1);
  }
  .-mid-h2 {
    font-size: var(--h2);
  }
  .-mid-h3 {
    font-size: var(--h3);
  }
  .-mid-h4 {
    font-size: var(--h4);
  }
  .-mid-h5 {
    font-size: var(--h5);
  }
  .-mid-h6 {
    font-size: var(--h6);
  }
  .-mid-p {
    font-size: var(--p);
  }
  .-mid-m {
    font-size: var(--m);
  }
  .-mid-mm {
    font-size: var(--mm);
  }
}

@media (max-width: 1024px) {
  .-m-lrg {
    font-size: var(--large);
  }
  .-m-h0 {
    font-size: var(--h0);
  }
  .-m-h1 {
    font-size: var(--h1);
  }
  .-m-h2 {
    font-size: var(--h2);
  }
  .-m-h3 {
    font-size: var(--h3);
  }
  .-m-h4 {
    font-size: var(--h4);
  }
  .-m-h5 {
    font-size: var(--h5);
  }
  .-m-h6 {
    font-size: var(--h6);
  }
  .-m-p {
    font-size: var(--p);
  }
  .-m-m {
    font-size: var(--m);
  }
  .-m-mm {
    font-size: var(--mm);
  }
}

.-up {
  text-transform: uppercase;
}
.-tac {
  text-align: center;
}

.-splitted {
  display: flex;
  flex-wrap: wrap;
}
.-s-line {
  display: flex;
  width: 100%;
  will-change: contents;
}
.-s-word {
  display: inline-flex;
  will-change: contents;
}
.-s-char {
  display: inline-flex;
  will-change: contents;
}

.-w {
  display: grid;
  grid-template-columns: repeat(14, 1fr);
  grid-template-rows: 1fr auto auto 1fr;
  align-items: start;
  column-gap: var(--g-gap);
  min-height: calc(var(--vh, 1vh) * 120);
}
.-w .note {
  grid-column-start: 1;
  grid-column-end: 15;
   grid-row-start: 1;
  justify-self: center; 
  align-self: start;
  text-align: center;
  z-index: 40;
  margin-top: var(--h0);
  background-color: var(--c-black);
}
.-w .image-bg {
  grid-column-start: 1;
  grid-column-end: 15;
  grid-row-start: 1;
  grid-row-end: 5;
  margin-top: calc( var(--vh,1vh) * 50 );

}
@media (min-width: 1024px) {
  .-w .image-bg {
    grid-column-start: 3;
    grid-column-end: 13;
    margin-top: min(calc( var(--vh,1vh) * 50 ), calc( var(--vw,1lvw) * 50 ));
  }
}
.-w .image-1 {
  grid-column-start: 3;
  grid-column-end: 13;
  grid-row-start: 1;
  grid-row-end: 5;
  margin-top: calc( var(--vh,1vh) * 25 );
  z-index: 20;

}
@media (min-width: 1024px) {
  .-w .image-1 {
    grid-column-start: 6;
    grid-column-end: 10;
    margin-top: min(calc( var(--vh,1vh) * 15 ), calc( var(--vw,1lvw) * 50 ));
  }
}
.-w .title {
  grid-column-start: 1;
  grid-column-end: 15;
  
  align-self: center;
  text-align: center;
  color: var(--c-black);
  position: relative;
}
.-w .line-1 {
  grid-row-start: 2;
  z-index: 20;
  margin-top: calc( var(--vh,1vh) * 35 );
  margin-bottom: 1em;
}
@media (min-width: 1024px) {
  .-w .line-1 {
    margin-top: initial;
    margin-bottom: initial;
    margin-top: calc( var(--vh,1vh) * 5 );
  }
}
.-w .line-2 {
  grid-row-start: 3;
  z-index: 20;
  
}
@media (min-width: 1024px) {
  .-w .line-2 {
    z-index: initial;
    margin-top: 0.5em;
  }
}
</style>
</head>

<body>
  <div class="-w">
  <span class="note -mm -up -tac">(Disabled on mobile devices by default)</span>
  <figure class="image-bg" string>
    <img string="lazy" string-lazy="https://picsum.photos/800/453" alt="StringTune">
  </figure>
  <figure class="image-1" string="parallax[]" string-parallax="0.75">
    <img string="lazy" string-lazy="https://picsum.photos/523/431" alt="StringTune">
  </figure>
  <h1 class="title line-1 -h0 -mid-h2 -m-h3" aria-hidden="true" string="parallax[]" string-parallax="-0.1">Thought</h1>
  <h1 class="title line-2 -h0 -mid-h2 -m-h3" aria-hidden="true" string="parallax[]" string-parallax="0.2">String</h1>
</div>
  
  <script>
    const stringTune = StringTune.StringTune.getInstance();
    window.StringTuneContext = stringTune;
      stringTune.use(StringTune.StringLazy);
  stringTune.use(StringTune.StringParallax);

    stringTune.start(0);
  </script>
  
</body>

</html>

</body>

</html>
